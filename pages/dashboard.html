<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Genie Dashboard</title>
    <link rel="stylesheet" href="../styles/dashboard.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <div class="dashboard-container">
        <aside class="sidebar">
            <div class="logo-container">
                <img src="../assets/Genie-removebg-preview.png" alt="Genie Logo" class="logo">
                <h1>Genie</h1>
            </div>
            <nav class="main-nav">
                <ul>
                    <li class="active"><a href="#"><i class="fas fa-home"></i> Home</a></li>
                    <li><a href="#"><i class="fas fa-comment-dots"></i> Chats</a></li>
                    <li><a href="#"><i class="fas fa-users"></i> Teams</a></li>
                    <li><a href="#"><i class="fas fa-cog"></i> Settings</a></li>
                </ul>
            </nav>
            <div class="user-profile">
                <div class="user-info">
                    <img src="../assets/avatar-placeholder.png" alt="User Avatar" class="avatar">
                    <div class="user-details">
                        <h3 class="user-name">User Name</h3>
                        <p class="user-status">Online</p>
                    </div>
                </div>
                <button id="logout-btn" class="logout-btn"><i class="fas fa-sign-out-alt"></i></button>
            </div>
        </aside>
        
        <main class="content">
            <header class="dashboard-header">
                <h2>Welcome to Genie</h2>
                <div class="theme-switcher">
                    <button class="theme-btn" data-theme="light" title="Light Theme">
                        <i class="fas fa-sun"></i>
                    </button>
                    <button class="theme-btn" data-theme="dark" title="Dark Theme">
                        <i class="fas fa-moon"></i>
                    </button>
                    <button class="theme-btn" data-theme="system" title="System Default">
                        <i class="fas fa-desktop"></i>
                    </button>
                </div>
            </header>
            
            <div class="dashboard-content">
                <div class="welcome-card">
                    <h3>Getting Started</h3>
                    <p>Welcome to Genie! Your AI-powered team communication platform.</p>
                    <button class="btn create-room-btn">Create New Chat Room</button>
                </div>
                
                <div class="chat-rooms-section">
                    <h3>Your Chat Rooms</h3>
                    <div class="chat-rooms-container">
                        <div class="chat-room-card">
                            <div class="chat-room-icon"><i class="fas fa-users"></i></div>
                            <div class="chat-room-info">
                                <h4>Project Alpha</h4>
                                <p>5 members · AI enabled</p>
                            </div>
                        </div>
                        <div class="chat-room-card">
                            <div class="chat-room-icon"><i class="fas fa-user-friends"></i></div>
                            <div class="chat-room-info">
                                <h4>Private Chat</h4>
                                <p>2 members · Direct message</p>
                            </div>
                        </div>
                        <div class="chat-room-card add-room">
                            <div class="add-room-icon"><i class="fas fa-plus"></i></div>
                            <p>Create Room</p>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Auth0 SDK -->
    <script src="https://cdn.auth0.com/js/auth0-spa-js/2.0/auth0-spa-js.production.js"></script>
    
    <!-- Application Scripts -->
    <script src="../scripts/auth0-config.js"></script>
    <script src="../scripts/theme-switcher.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-analytics-compat.js"></script>
    <script src="../scripts/firebase-config.js"></script>
    <script src="../scripts/dashboard.js"></script>
</body>
</html>
